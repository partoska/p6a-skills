name: Build
on:
  push:
    tags:
      - "build-*"
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pack skills
        run: |
          VERSION=$(grep '^  version:' skills/partoska/SKILL.md | sed 's/.*"\(.*\)"/\1/')
          ARTIFACT="partoska_skill_v${VERSION}.zip"
          echo "ARTIFACT=$ARTIFACT" >> "$GITHUB_ENV"
          cd skills/partoska
          zip -r "$GITHUB_WORKSPACE/$ARTIFACT" .
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$GITHUB_WORKSPACE/$ARTIFACT#$ARTIFACT" \
            --generate-notes \
            --title "$GITHUB_REF_NAME" \
            --verify-tag
